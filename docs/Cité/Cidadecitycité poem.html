    // Create Markov chain from text
    function buildMarkovChain(text, order = 2) {
      const chain = new Map();
      const words = text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 0);

      for (let i = 0; i <= words.length - order; i++) {
        const key = words.slice(i, i + order).join(' ');
        const next = words[i + order] || words[0]; // Loop back to beginning

        if (!chain.has(key)) {
          chain.set(key, []);
        }
        chain.get(key).push(next);
      }

      return chain;
    }

    // Generate text with controlled randomness
    function generateText(chain, randomness = 0.5, length = 100) {
      if (chain.size === 0) return '';

      const keys = Array.from(chain.keys());
      let current = keys[Math.floor(Math.random() * keys.length)];
      const result = [current];

      for (let i = 0; i < length; i++) {
        const possibleNext = chain.get(current) || [];
        if (possibleNext.length === 0) {
          current = keys[Math.floor(Math.random() * keys.length)];
          continue;
        }

        let next;
        if (Math.random() < randomness) {
          // High randomness: pick any word from the chain
          const allWords = Array.from(new Set(Array.from(chain.values()).flat()));
          next = allWords[Math.floor(Math.random() * allWords.length)];
        } else {
          // Low randomness: follow Markov chain
          next = possibleNext[Math.floor(Math.random() * possibleNext.length)];
        }

        result.push(next);

        // Update current key
        const currentWords = current.split(' ');
        currentWords.shift();
        currentWords.push(next);
        current = currentWords.join(' ');

        if (!chain.has(current)) {
          current = keys[Math.floor(Math.random() * keys.length)];
        }
      }

      return result.join(' '); // Add spaces back for readability
    }

    // Input controls
    const inputText = view(Inputs.textarea({

    const randomnessLevel = view(Inputs.range([0, 1], {

    const speed = view(Inputs.range([50, 200], {

  <script id="5" type="module" pinned="">
    // Text streaming animation (references the input values from the previous cell)
    const textContainer = display(htl.html`
      <div style="
        width: 100%;
        height: 200px;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: 'Courier New', monospace;
        font-size: 18px;
        font-weight: bold;
        position: relative;
        border: 2px solid #333;
        margin: 20px 0;
      ">
        <div id="streaming-text" style="
          position: absolute;
          white-space: nowrap;
          top: 50%;
          transform: translateY(-50%);
          color: #ffdd00;
          text-shadow: 0 0 10px #ffdd00;
          left: 100%;
        "></div>
      </div>
    `);

    // Animation variables
    let currentChain = window.buildMarkovChain(inputText || window.defaultText);
    let streamingText = window.generateText(currentChain, randomnessLevel, 300).replace(/\s+/g, ''); // Remove all spaces
    let animationFrame;
    let lastTime = 0;
    let position = textContainer.offsetWidth;
    let lastTextUpdate = 0;
    let lastRefreshTrigger = refreshButton; // Track button clicks

    function animate(currentTime) {
      if (!isRunning) {
        animationFrame = requestAnimationFrame(animate);
        return;
      }

      const textElement = textContainer.querySelector('#streaming-text');
      if (!textElement) {
        animationFrame = requestAnimationFrame(animate);
        return;
      }

      // Check if refresh button was clicked or 5 seconds have passed
      const shouldRefresh = (refreshButton !== lastRefreshTrigger) || (currentTime - lastTextUpdate > 5000);

      if (shouldRefresh) {
        currentChain = window.buildMarkovChain(inputText || window.defaultText);
        streamingText = window.generateText(currentChain, randomnessLevel, 300).replace(/\s+/g, ''); // Remove all spaces
        lastTextUpdate = currentTime;
        lastRefreshTrigger = refreshButton;
      }

      // Calculate movement
      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;

      // Move text from right to left
      position -= (speed * deltaTime) / 1000;

      // Reset position when text completely exits left side
      const textWidth = streamingText.length * 12; // Approximate character width
      if (position < -textWidth) {
        position = textContainer.offsetWidth;
        // Generate new text when it loops
        currentChain = window.buildMarkovChain(inputText || window.defaultText);
        streamingText = window.generateText(currentChain, randomnessLevel, 300).replace(/\s+/g, ''); // Remove all spaces
      }

      textElement.style.left = `${position}px`;
      textElement.textContent = streamingText;

      animationFrame = requestAnimationFrame(animate);
    }

    // Start animation
    animationFrame = requestAnimationFrame(animate);

    // Stop animation when cell is invalidated
    invalidation.then(() => {
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
      }
    });
  </script>
  <script id="4" type="text/markdown">
    ## Markov Chain Poetry Generator

    This generator creates a continuous stream of text inspired by Augusto de Campos' concrete poetry "cidade city cité". The text flows eternally from right to left without spaces, creating a hypnotic blend of languages and meanings.

    **Features:**
    - **Markov Chain Generation**: Creates new text based on patterns in your input
    - **Randomness Control**: Higher levels create more abstract, unintelligible text while preserving familiar fragments
    - **Speed Control**: Adjust how fast the text streams across the screen
    - **Multilingual Default**: Starts with words for "city" and "street" in multiple languages
    - **Continuous Flow**: Text streams endlessly without spaces, creating the "babelization" effect

    **How it works:**
    - The Markov chain analyzes word patterns in your input text
    - Lower randomness follows the original patterns more closely
    - Higher randomness blends words more chaotically, creating that "strange yet familiar" feeling
    - The streaming display creates the visual poetry effect of continuous, flowing language

    Try adjusting the randomness level to see how familiar words gradually dissolve into abstract linguistic fragments!
  </script>
