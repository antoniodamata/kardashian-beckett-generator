  <script id="4" type="module" pinned="">
    // Ultra-smooth organic word morpher with perfect DOM synchronization - Multi-word version
    class OrganicWordMorpher {
      constructor(words, container) {
        this.words = words;
        this.container = container;
        this.wordCount = 4; // Number of words to display
        this.letterCount = 5; // Letters per word

        // Initialize current and target words
        this.currentWords = [];
        this.targetWords = [];
        for (let i = 0; i < this.wordCount; i++) {
          this.currentWords.push(this.getRandomWord());
          this.targetWords.push(this.getRandomWord());
        }

        this.isRunning = true;

        // Create individual letter DOM elements for each word
        this.wordElements = [];
        this.letterElements = [];
        this.letterStates = [];

        // Organic timing properties
        this.globalTime = 0;
        this.morphTriggerTime = 0;
        this.nextMorphDelay = this.getRandomMorphDelay();

        // Organic movement parameters
        this.organicSpeed = 0.8;
        this.chaosLevel = 0.4;

        this.initializeDOM();
        this.scheduleNextMorph();
        this.startAnimation();
      }

      getRandomWord() {
        return this.words[Math.floor(Math.random() * this.words.length)];
      }

      getRandomMorphDelay() {
        return 2000 + Math.random() * 3000; // 2-5 seconds
      }

      initializeDOM() {
        // Clear container
        this.container.innerHTML = '';

        // Create word elements
        for (let wordIndex = 0; wordIndex < this.wordCount; wordIndex++) {
          const wordElement = document.createElement('div');
          wordElement.className = 'word-line';
          wordElement.style.cssText = `
            display: flex;
            justify-content: center;
            margin: -20px 0;
          `;

          const letterElements = [];
          const letterStates = [];

          // Create letter elements for this word
          for (let letterIndex = 0; letterIndex < this.letterCount; letterIndex++) {
            const letterElement = document.createElement('span');
            letterElement.className = 'letter';
            letterElement.style.cssText = `
              display: inline-block;
              transition: none;
              will-change: transform;
            `;

            letterElement.textContent = this.currentWords[wordIndex][letterIndex] || '';

            letterElements.push(letterElement);
            letterStates.push({
              current: this.currentWords[wordIndex][letterIndex] || '',
              target: this.targetWords[wordIndex][letterIndex] || '',
              progress: 0,
              morphing: false,
              organicOffset: Math.random() * Math.PI * 2
            });

            wordElement.appendChild(letterElement);
          }

          this.wordElements.push(wordElement);
          this.letterElements.push(letterElements);
          this.letterStates.push(letterStates);
          this.container.appendChild(wordElement);
        }
      }

      scheduleNextMorph() {
        if (!this.isRunning) return;

        setTimeout(() => {
          this.triggerMorph();
          this.nextMorphDelay = this.getRandomMorphDelay();
          this.scheduleNextMorph();
        }, this.nextMorphDelay);
      }

      triggerMorph() {
        // Pick a random word to morph
        const wordIndex = Math.floor(Math.random() * this.wordCount);
        const newTargetWord = this.getRandomWord();

        this.targetWords[wordIndex] = newTargetWord;

        // Start morphing letters in this word
        for (let letterIndex = 0; letterIndex < this.letterCount; letterIndex++) {
          const state = this.letterStates[wordIndex][letterIndex];
          state.target = newTargetWord[letterIndex] || '';
          state.morphing = true;
          state.progress = 0;
          state.organicOffset = Math.random() * Math.PI * 2;
        }
      }

      startAnimation() {
        const animate = () => {
          if (!this.isRunning) return;

          this.globalTime += 16; // ~60fps
          this.updateLetters();
          requestAnimationFrame(animate);
        };

        animate();
      }

      updateLetters() {
        for (let wordIndex = 0; wordIndex < this.wordCount; wordIndex++) {
          for (let letterIndex = 0; letterIndex < this.letterCount; letterIndex++) {
            const state = this.letterStates[wordIndex][letterIndex];
            const element = this.letterElements[wordIndex][letterIndex];

            if (state.morphing) {
              // Organic easing with chaos
              const organicProgress = this.getOrganicProgress(state.progress, state.organicOffset);

              if (organicProgress >= 1) {
                // Morph complete
                state.current = state.target;
                state.morphing = false;
                state.progress = 0;
                element.textContent = state.current;
              } else {
                // Mid-morph: show random characters
                const randomChar = this.getRandomChar();
                element.textContent = randomChar;
                state.progress += this.organicSpeed * 0.02;
              }
            }
          }
        }
      }

      getOrganicProgress(progress, offset) {
        const chaos = Math.sin(this.globalTime * 0.01 + offset) * this.chaosLevel;
        return Math.min(1, progress + chaos * 0.1);
      }

      getRandomChar() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
        return chars[Math.floor(Math.random() * chars.length)];
      }

      updateBlur(value) {
        this.container.style.filter = `blur(${value}px)`;
      }

      updateSpeed(value) {
        this.organicSpeed = value;
      }

      updateRandomness(value) {
        this.chaosLevel = value;
      }

      stop() {
        this.isRunning = false;
      }

      start() {
        if (!this.isRunning) {
          this.isRunning = true;
          this.scheduleNextMorph();
          this.startAnimation();
        }
      }
    }
  </script>

  <script id="5" type="text/html">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Arial:wght@900&display=swap');

    .brat-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      background: white;
      font-family: Arial, sans-serif;

  <script id="6" type="module" pinned="">
    // Initialize the ultra-smooth organic word morpher with better error handling
    const wordDisplay = document.querySelector('#wordDisplay');

    // Make sure the element exists before creating the morpher
    if (!wordDisplay) {
      console.error('Word display element not found!');
      throw new Error('Word display element not found');
    }

    console.log('Word display element found:', wordDisplay);

    // Create morpher with error handling
    let morpher;
    try {
      morpher = new OrganicWordMorpher(fiveLetterWords, wordDisplay);
      console.log('Morpher created successfully');
      console.log('Initial words:', morpher.currentWords);
      console.log('Word elements created:', morpher.wordElements.length);
    } catch (error) {
      console.error('Error creating morpher:', error);
      throw error;
    }

    // Get control elements
    const blurControl = document.querySelector('#blurControl');
    const speedControl = document.querySelector('#speedControl');
    const randomnessControl = document.querySelector('#randomnessControl');
    const startStopBtn = document.querySelector('#startStopBtn');

    // High-performance animation loop with consistent timing
    let lastTime = performance.now();
    let animationFrame;
    let isAnimating = true;

    function animate(currentTime) {
      const deltaTime = Math.min(currentTime - lastTime, 50); // Cap delta to prevent jumps
      lastTime = currentTime;

      if (isAnimating && morpher) {
        morpher.update(deltaTime);
      }

      animationFrame = requestAnimationFrame(animate);
    }

    // Optimized event listeners with debouncing
    let blurTimeout;
    if (blurControl) {
      blurControl.addEventListener('input', (e) => {
        clearTimeout(blurTimeout);
        blurTimeout = setTimeout(() => {
          if (wordDisplay) {
            wordDisplay.style.filter = `blur(${e.target.value}px)`;
          }
        }, 16); // ~60fps debounce
      });
    }

    if (speedControl) {
      speedControl.addEventListener('input', (e) => {
        morpher.setOrganicSpeed(parseFloat(e.target.value));
      });
    }

    if (randomnessControl) {
      randomnessControl.addEventListener('input', (e) => {
        morpher.setChaosLevel(parseFloat(e.target.value));
      });
    }

    if (startStopBtn) {
      startStopBtn.addEventListener('click', () => {
        isAnimating = !isAnimating;
        if (isAnimating) {
          morpher.start();
          startStopBtn.textContent = 'STOP';
          startStopBtn.classList.remove('stopped');
        } else {
          morpher.stop();
          startStopBtn.textContent = 'START';
          startStopBtn.classList.add('stopped');
        }
      });
    }

    // Start the animation immediately
    animate(performance.now());

    // Clean up on invalidation
    invalidation.then(() => {
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
      }
    });

    // Force initial display
    setTimeout(() => {
      console.log('Checking DOM after timeout...');
      console.log('Word display children:', wordDisplay.children.length);
      console.log('First word element:', wordDisplay.children[0]);
      if (wordDisplay.children[0]) {
        console.log('First word content:', wordDisplay.children[0].textContent);
      }
    }, 500);
  </script>
