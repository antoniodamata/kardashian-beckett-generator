  <script id="8" type="module" pinned="">
    // UTF-8 Hex Decoder and Poem Visualizer
    function decodeUTF8Hex(hexString) {
      // Remove spaces and split into pairs
      const hexPairs = hexString.replace(/\s+/g, '').match(/.{2}/g) || [];

      // Convert hex pairs to bytes
      const bytes = hexPairs.map(hex => parseInt(hex, 16));

      // Decode UTF-8 bytes to text
      const decoder = new TextDecoder('utf-8');
      const uint8Array = new Uint8Array(bytes);
      const decodedText = decoder.decode(uint8Array);

      return {
        hexPairs,
        bytes,
        decodedText,
        analysis: analyzeHexToText(hexPairs, decodedText)
      };
    }

    function analyzeHexToText(hexPairs, text) {
      const analysis = [];
      let textIndex = 0;
      let hexIndex = 0;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const encoder = new TextEncoder();
        const charBytes = encoder.encode(char);

        const hexBytes = [];
        for (let j = 0; j < charBytes.length; j++) {
          if (hexIndex < hexPairs.length) {
            hexBytes.push(hexPairs[hexIndex]);
            hexIndex++;
          }
        }

        analysis.push({
          character: char,
          hexBytes: hexBytes,
          codePoint: char.codePointAt(0),
          description: char === ' ' ? 'SPACE' : char === '\n' ? 'NEWLINE' : 'CHARACTER'
        });
      }

      return analysis;
    }

    // Your encoded message

  <script id="3" type="module" pinned="">
    // UTF-8 Byte Analysis with Enhanced Precision
    function analyzeUTF8(text) {
      const encoder = new TextEncoder();
      const bytes = encoder.encode(text);

      const analysis = [];
      let byteIndex = 0;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const codePoint = char.codePointAt(0);
        const charBytes = encoder.encode(char);

        // Enhanced hex formatting for better precision
        const hexCodePoint = codePoint.toString(16).toUpperCase().padStart(codePoint > 0xFFFF ? 6 : 4, '0');
        const utf8BytesHex = Array.from(charBytes).map(b => '0x' + b.toString(16).toUpperCase().padStart(2, '0'));
        const binaryRepresentation = Array.from(charBytes).map(b => b.toString(2).padStart(8, '0'));

        analysis.push({
          character: char,
          codePoint: codePoint,
          hex: hexCodePoint,
          utf8Bytes: utf8BytesHex,
          utf8Binary: binaryRepresentation,
          byteLength: charBytes.length,
          category: getCharacterCategory(codePoint),
          description: getCharacterDescription(char, codePoint)
        });

        byteIndex += charBytes.length;
      }

      return { analysis, totalBytes: bytes.length };
    }

    function getCharacterCategory(codePoint) {
      if (codePoint < 128) return 'ASCII (7-bit)';
      if (codePoint < 256) return 'Latin-1 Extended';
      if (codePoint >= 0x1F300 && codePoint <= 0x1F9FF) return 'Emoji Block';
      if (codePoint >= 0x0080 && codePoint <= 0x024F) return 'Latin Extended';
      if (codePoint >= 0x0370 && codePoint <= 0x03FF) return 'Greek';
      if (codePoint >= 0x0400 && codePoint <= 0x04FF) return 'Cyrillic';
      return 'Unicode Extended';
    }

    function getCharacterDescription(char, codePoint) {
      if (char === ' ') return 'SPACE';
      if (char === '\n') return 'LINE FEED';
      if (char === '\t') return 'TAB';
      if (char === '\r') return 'CARRIAGE RETURN';
      if (codePoint >= 0x1F300 && codePoint <= 0x1F9FF) return 'EMOJI';
      if (/[a-zA-Z]/.test(char)) return 'LETTER';
      if (/[0-9]/.test(char)) return 'DIGIT';
      if (/[.,!?;:]/.test(char)) return 'PUNCTUATION';
      return 'SYMBOL';
    }

    const utf8Analysis = analyzeUTF8(inputText);
    display("UTF-8 Byte Analysis (Enhanced Precision):");

        <tbody>
          ${utf8Analysis.analysis.map(item => htl.html`
            <tr style="background: #111;">
              <td style="border: 1px solid #555; padding: 8px; text-align: center; color: #fff; font-weight: bold; font-size: 14px;">${item.character === ' ' ? '␣' : item.character}</td>
              <td style="border: 1px solid #555; padding: 8px; color: #FFC107; text-align: center; font-size: 11px;">${item.description}</td>
              <td style="border: 1px solid #555; padding: 8px; color: #fff; text-align: center;">${item.codePoint}</td>
              <td style="border: 1px solid #555; padding: 8px; color: #4CAF50; text-align: center; font-weight: bold;">U+${item.hex}</td>
              <td style="border: 1px solid #555; padding: 8px; color: #2196F3; text-align: center; font-weight: bold;">${item.utf8Bytes.join(' ')}</td>
              <td style="border: 1px solid #555; padding: 8px; color: #E91E63; text-align: center; font-size: 10px;">${item.utf8Binary.join(' ')}</td>
              <td style="border: 1px solid #555; padding: 8px; color: #FF9800; text-align: center; font-size: 11px;">${item.category}</td>
            </tr>
          `)}
        </tbody>
      </table>
    </div>`);

  <script id="4" type="module" pinned="">
    // Character-level Tokenization
    function characterTokenize(text) {
      return text.split('').map((char, index) => ({
        token: char,
        index: index,
        type: 'character'
      }));
    }

    // Word-level Tokenization
    function wordTokenize(text) {
      const words = text.match(/\S+/g) || [];
      return words.map((word, index) => ({
        token: word,
        index: index,
        type: 'word'
      }));
    }

    // Subword Tokenization (simplified BPE-like)
    function subwordTokenize(text) {
      // This is a simplified version - real BPE is much more complex
      const tokens = [];
      const words = text.split(/\s+/);

      words.forEach((word, wordIndex) => {
        if (word.length <= 3) {
          tokens.push({ token: word, index: tokens.length, type: 'subword' });
        } else {
          // Split longer words into subwords
          for (let i = 0; i < word.length; i += 2) {
            const subword = word.slice(i, i + 2);
            tokens.push({ token: subword, index: tokens.length, type: 'subword' });
          }
        }
      });

      return tokens;
    }

    // UTF-8 Byte Tokenization
    function utf8ByteTokenize(text) {
      const encoder = new TextEncoder();
      const bytes = encoder.encode(text);
      return Array.from(bytes).map((byte, index) => ({
        token: byte.toString(16).toUpperCase().padStart(2, '0'),
        index: index,
        type: 'utf8-byte'
      }));
    }
  </script>

  <script id="6" type="module" pinned="">
    // Dynamic tokenization based on user input
    function tokenizeByMethod(text, method) {
      switch(method) {
        case 'character':
          return characterTokenize(text);
        case 'word':
          return wordTokenize(text);
        case 'subword':
          return subwordTokenize(text);
        case 'utf8':
          return utf8ByteTokenize(text);
        default:
          return characterTokenize(text);
      }
    }

    const currentTokens = tokenizeByMethod(textInput, tokenizationMethod);

    display("Current Tokenization:");
    display(htl.html`<div style="background: #111; color: #fff; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #555; font-family: monospace; font-size: 14px;">
